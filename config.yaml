camera:
  device_index: 0
  capture_width: 1280
  capture_height: 720
  target_portrait_width: 720
  target_portrait_height: 1280
  fps: 30

mediapipe:
  pose:
    model_complexity: 1          # 0=lite, 1=full, 2=heavy
    min_detection_confidence: 0.5
    min_tracking_confidence: 0.5
  face_detection:
    model_selection: 1           # 1=full-range (up to 5m)
    min_detection_confidence: 0.5
  segmentation:
    model_selection: 1           # 1=landscape (better for full body)

skeleton_buffer:
  duration_seconds: 5.0
  sample_rate_hz: 10             # downsample from camera fps
  max_samples: 50

reaction_sequencer:
  image_directory: "assets/reaction_images"
  display_duration_seconds: 4.0
  inter_stimulus_interval_seconds: 1.5
  shuffle: true

face_strip:
  frames_per_image: 8            # face captures per reaction image
  thumbnail_size: [256, 256]
  grid_layout: "horizontal"      # horizontal | grid
  padding: 4

llm:
  provider: "gemini"
  model: "gemini-2.0-flash"
  max_tokens: 2048
  body_language_format: "rendered_frames"  # "json_timeseries" | "rendered_frames"

output:
  session_dir: "output/sessions"
  save_raw_frames: false
  save_skeleton_data: true
  save_face_strips: true
  save_llm_responses: true

preview:
  show_pose_overlay: true
  show_face_bbox: true
  show_segmentation_mask: false
  window_name: "Reaction Capture"
